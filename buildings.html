<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buildings - Servora</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    background:#020617;
    padding:25px;
}

.sidebar h2{
    color:#60a5fa;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    margin:18px 0;
}

.main{
    margin-left:270px;
    padding:30px;
}

input,select{
    width:100%;
    max-width:600px;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    max-width:700px;
}

.label{
    color:#60a5fa;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>SERVORA</h2>

<a href="dashboard.html">Dashboard</a>
<a href="properties.html">Properties</a>
<a href="buildings.html">Buildings</a>
<a href="units.html">Units</a>
<a href="request.html">Maintenance Request</a>
<a href="technician.html">Technician Portal</a>

</div>

<div class="main">

<h1>Buildings</h1>

<p>Create buildings for each property.</p>

<select id="propertySelect">

<option value="">Select Property</option>

</select>

<input
id="buildingName"
placeholder="Building Name">

<button onclick="saveBuilding()">

Save Building

</button>

<h2>Buildings</h2>

<div id="buildingList"></div>

</div>

<script>

const API_URL="http://localhost:3000";

async function loadProperties(){

const response=await fetch(API_URL+"/properties");

const properties=await response.json();

const dropdown=document.getElementById("propertySelect");

dropdown.innerHTML="<option>Select Property</option>";

properties.forEach(property=>{

dropdown.innerHTML+=`

<option value="${property.name}">

${property.name}

</option>

`;

});

}

async function loadBuildings(){

const response=await fetch(API_URL+"/buildings");

const buildings=await response.json();

const list=document.getElementById("buildingList");

list.innerHTML="";

if(buildings.length===0){

list.innerHTML="<p>No buildings created.</p>";

return;

}

buildings.forEach(building=>{

list.innerHTML+=`

<div class="card">

<h3>${building.name}</h3>

<p>

<span class="label">

Property:

</span>

${building.property}

</p>

</div>

`;

});

}

async function saveBuilding(){

const property=document.getElementById("propertySelect").value;

const building=document.getElementById("buildingName").value;

if(property===""||building===""){

alert("Complete all fields.");

return;

}

await fetch(API_URL+"/buildings",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

property:property,

name:building

})

});

document.getElementById("buildingName").value="";

loadBuildings();

}

loadProperties();

loadBuildings();

</script>

</body>

</html>
