<!DOCTYPE html>
<html>
<head>
    <title>Create Account - Servora</title>

    <style>

        body{
            font-family:Arial;
            margin:0;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .signup-box{

            background:#111827;
            padding:40px;
            width:420px;
            border-radius:15px;
            text-align:center;

        }

        h1{

            color:#60a5fa;

        }

        p{

            color:#cbd5e1;

        }

        input{

            width:100%;
            padding:14px;
            margin:12px 0;
            border:none;
            border-radius:8px;
            font-size:16px;

        }

        .btn{

            width:100%;
            padding:15px;
            margin-top:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;

        }

        .btn:hover{

            background:#1d4ed8;

        }

        a{

            color:#60a5fa;
            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="signup-box">

<h1>Create Your Servora Account</h1>

<p>Start managing maintenance with AI.</p>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Company Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Create Password">

<input type="password" placeholder="Confirm Password">

<button class="btn" onclick="window.location.href='dashboard.html'">

Create Account

</button>

<br><br>

<a href="login.html">

Already have an account? Login

</a>

</div>

</body>

</html>
