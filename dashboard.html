<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Servora Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    position: fixed;
    padding: 25px;
}

.sidebar h2 {
    color: #60a5fa;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 18px 0;
}

.main {
    margin-left: 270px;
    padding: 30px;
}

.btn {
    padding: 14px 22px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 20px 0;
}

.card,
.request-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.card {
    width: 220px;
}

.request-card {
    max-width: 760px;
    margin-bottom: 20px;
}

small {
    color: #94a3b8;
}

.label {
    color: #60a5fa;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SERVORA</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="request.html">New Request</a>
    <a href="index.html">Home</a>
</div>

<div class="main">
    <h1>Maintenance Dashboard</h1>
    <p>AI-powered overview of your maintenance operations.</p>

    <button class="btn" onclick="window.location.href='request.html'">
        + New Maintenance Request
    </button>

    <div class="cards">
        <div class="card">
            <h3>Open Requests</h3>
            <h1 id="openCount">0</h1>
        </div>

        <div class="card">
            <h3>AI Alerts</h3>
            <h1 id="alertCount">0</h1>
        </div>
    </div>

    <h2>Recent Requests</h2>
    <div id="recent"></div>
</div>

<script>
const requests = JSON.parse(localStorage.getItem("requests")) || [];

document.getElementById("openCount").textContent = requests.length;

document.getElementById("alertCount").textContent =
    requests.filter(r => r.priority === "High" || r.priority === "Emergency").length;

const recent = document.getElementById("recent");

if (requests.length === 0) {
    recent.innerHTML = "<p>No requests submitted yet.</p>";
} else {
    requests.slice().reverse().forEach(r => {
        recent.innerHTML += `
            <div class="request-card">
                <h3>${r.category} - ${r.priority}</h3>

                <p><span class="label">Property:</span> ${r.property}</p>
                <p><span class="label">Unit:</span> ${r.unit}</p>
                <p><span class="label">Description:</span> ${r.description}</p>

                <hr>

                <h3>AI Analysis</h3>

                <p><span class="label">Recommended Technician:</span> ${r.technician}</p>
                <p><span class="label">Estimated Response:</span> ${r.responseTime}</p>
                <p><span class="label">Suggested Work Order:</span> ${r.suggestedWorkOrder}</p>

                <small>Submitted: ${r.date}</small>
            </div>
        `;
    });
}
</script>

</body>
</html>
