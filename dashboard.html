<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Servora Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    position: fixed;
    padding: 25px;
}

.sidebar h2 {
    color: #60a5fa;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 18px 0;
}

.main {
    margin-left: 270px;
    padding: 30px;
}

.btn {
    padding: 14px 22px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 8px 8px 8px 0;
}

.btn:hover {
    background: #2563eb;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 20px 0;
}

.card,
.request-card,
.activity-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.card {
    width: 220px;
}

.request-card {
    max-width: 760px;
    margin-bottom: 20px;
}

.activity-card {
    max-width: 760px;
    margin-bottom: 20px;
}

small {
    color: #94a3b8;
}

.label {
    color: #60a5fa;
    font-weight: bold;
}

hr {
    border: 1px solid #334155;
}

.section-title {
    margin-top: 35px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SERVORA</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="request.html">New Request</a>
    <a href="#workOrders">Work Orders</a>
    <a href="technician.html">Technician Portal</a>
    <a href="index.html">Home</a>
</div>

<div class="main">
    <h1>Manager Dashboard</h1>
    <p>AI-powered command center for your maintenance operations.</p>

    <div>
        <button class="btn" onclick="window.location.href='request.html'">
            + New Maintenance Request
        </button>

        <button class="btn" onclick="window.location.href='technician.html'">
            Technician Portal
        </button>

        <button class="btn" onclick="document.getElementById('workOrders').scrollIntoView()">
            View Work Orders
        </button>
    </div>

    <h2 class="section-title">Today's Overview</h2>

    <div class="cards">
        <div class="card">
            <h3>Open Requests</h3>
            <h1 id="openCount">0</h1>
        </div>

        <div class="card">
            <h3>AI Alerts</h3>
            <h1 id="alertCount">0</h1>
        </div>

        <div class="card">
            <h3>Work Orders</h3>
            <h1 id="workOrderCount">0</h1>
        </div>

        <div class="card">
            <h3>Completed Jobs</h3>
            <h1 id="completedCount">0</h1>
        </div>
    </div>

    <h2 class="section-title">Latest Activity</h2>
    <div id="activityFeed"></div>

    <h2 class="section-title">Recent Requests</h2>
    <div id="recent"></div>

    <h2 id="workOrders" class="section-title">Work Orders</h2>
    <div id="workOrderList"></div>
</div>

<script>
const requests = JSON.parse(localStorage.getItem("requests")) || [];

document.getElementById("openCount").textContent = requests.length;

document.getElementById("alertCount").textContent =
    requests.filter(r => r.priority === "High" || r.priority === "Emergency").length;

document.getElementById("workOrderCount").textContent = requests.length;

let completedJobs = 0;

requests.forEach((r, index) => {
    let statusKey = "status_" + index;
    let status = localStorage.getItem(statusKey) || "Pending";

    if (status === "Completed") {
        completedJobs++;
    }
});

document.getElementById("completedCount").textContent = completedJobs;

const activityFeed = document.getElementById("activityFeed");
const recent = document.getElementById("recent");
const workOrderList = document.getElementById("workOrderList");

if (requests.length === 0) {
    activityFeed.innerHTML = "<p>No activity yet.</p>";
    recent.innerHTML = "<p>No requests submitted yet.</p>";
    workOrderList.innerHTML = "<p>No work orders created yet.</p>";
} else {
    requests.slice().reverse().forEach((r, index) => {
        let statusKey = "status_" + index;
        let status = localStorage.getItem(statusKey) || "Pending";

        activityFeed.innerHTML += `
            <div class="activity-card">
                <p>
                    <span class="label">AI Created Work Order:</span>
                    ${r.category} request for ${r.property}, Unit ${r.unit}
                </p>
                <p><span class="label">Status:</span> ${status}</p>
                <small>${r.date}</small>
            </div>
        `;

        recent.innerHTML += `
            <div class="request-card">
                <h3>${r.category} - ${r.priority}</h3>

                <p><span class="label">Property:</span> ${r.property}</p>
                <p><span class="label">Unit:</span> ${r.unit}</p>
                <p><span class="label">Description:</span> ${r.description}</p>

                <hr>

                <h3>AI Analysis</h3>

                <p><span class="label">Recommended Technician:</span> ${r.technician}</p>
                <p><span class="label">Estimated Response:</span> ${r.responseTime}</p>
                <p><span class="label">Suggested Work Order:</span> ${r.suggestedWorkOrder}</p>

                <small>Submitted: ${r.date}</small>
            </div>
        `;

        workOrderList.innerHTML += `
            <div class="request-card">
                <h3>Work Order #${1001 + index}</h3>

                <p><span class="label">Property:</span> ${r.property}</p>
                <p><span class="label">Unit:</span> ${r.unit}</p>
                <p><span class="label">Issue Type:</span> ${r.category}</p>
                <p><span class="label">Priority:</span> ${r.priority}</p>
                <p><span class="label">Assigned Technician:</span> ${r.technician}</p>
                <p><span class="label">Status:</span> ${status}</p>
                <p><span class="label">Work Order:</span> ${r.suggestedWorkOrder}</p>

                <small>Created: ${r.date}</small>
            </div>
        `;
    });
}
</script>

</body>
</html>
