!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Units - Servora</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    background:#020617;
    padding:25px;
}

.sidebar h2{
    color:#60a5fa;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    margin:18px 0;
}

.main{
    margin-left:270px;
    padding:30px;
}

input,select{
    width:100%;
    max-width:600px;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

.label{
    color:#60a5fa;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>SERVORA</h2>

<a href="dashboard.html">Dashboard</a>
<a href="properties.html">Properties</a>
<a href="buildings.html">Buildings</a>
<a href="units.html">Units</a>
<a href="request.html">Maintenance Request</a>
<a href="technician.html">Technician Portal</a>

</div>

<div class="main">

<h1>Units</h1>

<p>Add units to each building.</p>

<select id="propertySelect">
<option>Select Property</option>
</select>

<select id="buildingSelect">
<option>Select Building</option>
</select>

<input
id="unitNumber"
placeholder="Unit Number">

<button onclick="saveUnit()">

Save Unit

</button>

<h2>Saved Units</h2>

<div id="unitList"></div>

<script>

const API_URL="http://localhost:3000";

let buildings=[];

async function loadProperties(){

const response=await fetch(API_URL+"/properties");

const properties=await response.json();

const dropdown=document.getElementById("propertySelect");

dropdown.innerHTML="<option>Select Property</option>";

properties.forEach(property=>{

dropdown.innerHTML+=`

<option value="${property.name}">

${property.name}

</option>

`;

});

}

async function loadBuildings(){

const response = await fetch(API_URL + "/buildings");
buildings = await response.json();

updateBuildingDropdown();

}

function updateBuildingDropdown(){

const property = document.getElementById("propertySelect").value;

const dropdown = document.getElementById("buildingSelect");

dropdown.innerHTML = "<option>Select Building</option>";

buildings
.filter(building => building.property === property)
.forEach(building => {

dropdown.innerHTML += `
<option value="${building.name}">
${building.name}
</option>
`;

});

}

document.getElementById("propertySelect").addEventListener("change", updateBuildingDropdown);

async function loadUnits(){

const response = await fetch(API_URL + "/units");

const units = await response.json();

const list = document.getElementById("unitList");

list.innerHTML = "";

if(units.length === 0){

list.innerHTML = "<p>No units created.</p>";

return;

}

units.forEach(unit=>{

list.innerHTML += `

<div class="card">

<h3>Unit ${unit.unit}</h3>

<p><span class="label">Property:</span> ${unit.property}</p>

<p><span class="label">Building:</span> ${unit.building}</p>

</div>

`;

});

}

async function saveUnit(){

const property = document.getElementById("propertySelect").value;
const building = document.getElementById("buildingSelect").value;
const unit = document.getElementById("unitNumber").value;

if(property==="" || building==="" || unit===""){

alert("Complete all fields.");

return;

}

await fetch(API_URL + "/units",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

property:property,
building:building,
unit:unit

})

});

document.getElementById("unitNumber").value="";

loadUnits();

}

loadProperties();
loadBuildings();
loadUnits();

</script>

</div>

</body>
</html>
