<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Maintenance Request - Servora</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    position: fixed;
    padding: 25px;
}

.sidebar h2 {
    color: #60a5fa;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 18px 0;
}

.main {
    margin-left: 270px;
    padding: 30px;
}

select,
textarea,
input {
    width: 100%;
    max-width: 700px;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    display: block;
}

textarea {
    height: 140px;
}

.btn {
    padding: 14px 22px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.label {
    color: #60a5fa;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SERVORA</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="properties.html">Properties</a>
    <a href="buildings.html">Buildings</a>
    <a href="units.html">Units</a>
    <a href="request.html">New Request</a>
    <a href="technician.html">Technician Portal</a>
    <a href="index.html">Home</a>
</div>

<div class="main">
    <h1>New Maintenance Request</h1>
    <p>Select a property, describe the issue, and Servora AI will analyze it.</p>

    <select id="property">
        <option value="">Select Property</option>
    </select>

    <input id="unit" type="text" placeholder="Unit Number">

    <textarea id="description" placeholder="Example: Water is leaking under the kitchen sink..."></textarea>

    <input id="photo" type="file" accept="image/*">

    <button class="btn" onclick="submitRequest()">Submit Request</button>
</div>

<script>
const API_URL = "http://localhost:3000";

async function loadProperties() {
    const response = await fetch(API_URL + "/properties");
    const properties = await response.json();

    const propertyDropdown = document.getElementById("property");
    propertyDropdown.innerHTML = '<option value="">Select Property</option>';

    properties.forEach(function(property) {
        propertyDropdown.innerHTML += `
            <option value="${property.name}">
                ${property.name}
            </option>
        `;
    });
}

function analyzeRequest(description) {
    let text = description.toLowerCase();

    let category = "General Maintenance";
    let priority = "Medium";
    let technician = "General Technician";
    let responseTime = "24 hours";
    let suggestedWorkOrder = "Review the issue and assign the proper technician.";

    if (
        text.includes("leak") ||
        text.includes("water") ||
        text.includes("pipe") ||
        text.includes("sink") ||
        text.includes("toilet")
    ) {
        category = "Plumbing";
        priority = "High";
        technician = "Plumber";
        responseTime = "2 hours";
        suggestedWorkOrder = "Inspect plumbing lines, shut off water if needed, and repair leak source.";
    }

    if (
        text.includes("ac") ||
        text.includes("air conditioner") ||
        text.includes("hvac") ||
        text.includes("cooling") ||
        text.includes("heat")
    ) {
        category = "HVAC";
        priority = "High";
        technician = "HVAC Technician";
        responseTime = "4 hours";
        suggestedWorkOrder = "Inspect HVAC system, thermostat, compressor, and airflow.";
    }

    if (
        text.includes("electric") ||
        text.includes("outlet") ||
        text.includes("power") ||
        text.includes("sparking") ||
        text.includes("breaker") ||
        text.includes("smoke")
    ) {
        category = "Electrical";
        priority = "Emergency";
        technician = "Electrician";
        responseTime = "Immediate";
        suggestedWorkOrder = "Inspect electrical system immediately, secure the area, and shut off power if needed.";
    }

    if (
        text.includes("fridge") ||
        text.includes("refrigerator") ||
        text.includes("stove") ||
        text.includes("oven") ||
        text.includes("dishwasher")
    ) {
        category = "Appliance";
        priority = "Medium";
        technician = "Appliance Technician";
        responseTime = "24 hours";
        suggestedWorkOrder = "Inspect appliance, diagnose failure, and repair or replace faulty parts.";
    }

    return {
        category,
        priority,
        technician,
        responseTime,
        suggestedWorkOrder
    };
}

async function submitRequest() {
    const property = document.getElementById("property").value;
    const unit = document.getElementById("unit").value;
    const description = document.getElementById("description").value;
    const photoInput = document.getElementById("photo");
    const photoName = photoInput.files.length > 0 ? photoInput.files[0].name : "No photo uploaded";

    if (property === "") {
        alert("Please select a property.");
        return;
    }

    if (unit === "") {
        alert("Please enter a unit number.");
        return;
    }

    if (description === "") {
        alert("Please describe the maintenance issue.");
        return;
    }

    const ai = analyzeRequest(description);

    const request = {
        property: property,
        unit: unit,
        description: description,
        photoName: photoName,
        category: ai.category,
        priority: ai.priority,
        technician: ai.technician,
        responseTime: ai.responseTime,
        suggestedWorkOrder: ai.suggestedWorkOrder,
        date: new Date().toLocaleString()
    };

    await fetch(API_URL + "/requests", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(request)
    });

    alert("Request submitted! Servora AI analyzed the issue.");
    window.location.href = "dashboard.html";
}

loadProperties();
</script>

</body>
</html>
