<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Maintenance Request - Servora</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 750px;
    margin: 50px auto;
    background: #111827;
    padding: 40px;
    border-radius: 15px;
}

h1 {
    color: #60a5fa;
}

p {
    color: #cbd5e1;
}

select,
textarea,
input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

textarea {
    height: 140px;
}

.btn {
    padding: 15px 25px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    cursor: pointer;
}

.btn:hover {
    background: #2563eb;
}

a {
    color: #60a5fa;
    text-decoration: none;
}

.photo-note {
    color: #94a3b8;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>New Maintenance Request</h1>
    <p>Select the location, describe the issue, and upload a photo if available.</p>

    <select id="property" onchange="loadBuildings()">
        <option value="">Select Property</option>
    </select>

    <select id="building" onchange="loadUnits()">
        <option value="">Select Building</option>
    </select>

    <select id="unit">
        <option value="">Select Unit</option>
    </select>

    <textarea id="description" placeholder="Example: Water is leaking under the kitchen sink..."></textarea>

    <p class="photo-note">Upload Photo</p>
    <input id="photo" type="file" accept="image/*">

    <button class="btn" onclick="submitRequest()">
        Submit Request
    </button>

    <p><a href="dashboard.html">Back to Dashboard</a></p>
</div>

<script>
let properties = JSON.parse(localStorage.getItem("properties")) || [];
let buildings = JSON.parse(localStorage.getItem("buildings")) || [];
let units = JSON.parse(localStorage.getItem("units")) || [];

let propertyDropdown = document.getElementById("property");
let buildingDropdown = document.getElementById("building");
let unitDropdown = document.getElementById("unit");

properties.forEach(function(property) {
    let option = document.createElement("option");
    option.value = property.name;
    option.textContent = property.name;
    propertyDropdown.appendChild(option);
});

function loadBuildings() {
    let selectedProperty = propertyDropdown.value;

    buildingDropdown.innerHTML = '<option value="">Select Building</option>';
    unitDropdown.innerHTML = '<option value="">Select Unit</option>';

    buildings
        .filter(building => building.property === selectedProperty)
        .forEach(function(building) {
            let option = document.createElement("option");
            option.value = building.name;
            option.textContent = building.name;
            buildingDropdown.appendChild(option);
        });
}

function loadUnits() {
    let selectedProperty = propertyDropdown.value;
    let selectedBuilding = buildingDropdown.value;

    unitDropdown.innerHTML = '<option value="">Select Unit</option>';

    units
        .filter(unit => unit.property === selectedProperty && unit.building === selectedBuilding)
        .forEach(function(unit) {
            let option = document.createElement("option");
            option.value = unit.unit;
            option.textContent = unit.unit;
            unitDropdown.appendChild(option);
        });
}

function analyzeRequest(description) {
    let text = description.toLowerCase();

    let category = "General Maintenance";
    let priority = "Medium";
    let technician = "General Technician";
    let responseTime = "24 hours";
    let suggestedWorkOrder = "Review the issue and assign the proper technician.";

    if (text.includes("leak") || text.includes("water") || text.includes("pipe") || text.includes("sink") || text.includes("toilet")) {
        category = "Plumbing";
        priority = "High";
        technician = "Plumber";
        responseTime = "2 hours";
        suggestedWorkOrder = "Inspect plumbing lines, shut off water if needed, and repair leak source.";
    }

    if (text.includes("ac") || text.includes("air conditioner") || text.includes("hvac") || text.includes("cooling") || text.includes("heat")) {
        category = "HVAC";
        priority = "High";
        technician = "HVAC Technician";
        responseTime = "4 hours";
        suggestedWorkOrder = "Inspect HVAC system, thermostat, compressor, and airflow.";
    }

    if (text.includes("electric") || text.includes("outlet") || text.includes("power") || text.includes("sparking") || text.includes("breaker") || text.includes("smoke")) {
        category = "Electrical";
        priority = "Emergency";
        technician = "Electrician";
        responseTime = "Immediate";
        suggestedWorkOrder = "Inspect electrical system immediately, secure the area, and shut off power if needed.";
    }

    if (text.includes("fridge") || text.includes("refrigerator") || text.includes("stove") || text.includes("oven") || text.includes("dishwasher")) {
        category = "Appliance";
        priority = "Medium";
        technician = "Appliance Technician";
        responseTime = "24 hours";
        suggestedWorkOrder = "Inspect appliance, diagnose failure, and repair or replace faulty parts.";
    }

    return { category, priority, technician, responseTime, suggestedWorkOrder };
}

function submitRequest() {
    let selectedProperty = propertyDropdown.value;
    let selectedBuilding = buildingDropdown.value;
    let selectedUnit = unitDropdown.value;
    let description = document.getElementById("description").value;
    let photoInput = document.getElementById("photo");
    let photoName = photoInput.files.length > 0 ? photoInput.files[0].name : "No photo uploaded";

    if (selectedProperty === "") {
        alert("Please select a property.");
        return;
    }

    if (selectedBuilding === "") {
        alert("Please select a building.");
        return;
    }

    if (selectedUnit === "") {
        alert("Please select a unit.");
        return;
    }

    if (description === "") {
        alert("Please describe the maintenance issue.");
        return;
    }

    let ai = analyzeRequest(description);

    let request = {
        property: selectedProperty,
        building: selectedBuilding,
        unit: selectedUnit,
        description: description,
        photoName: photoName,
        category: ai.category,
        priority: ai.priority,
        technician: ai.technician,
        responseTime: ai.responseTime,
        suggestedWorkOrder: ai.suggestedWorkOrder,
        date: new Date().toLocaleString()
    };

    let requests = JSON.parse(localStorage.getItem("requests")) || [];
    requests.push(request);
    localStorage.setItem("requests", JSON.stringify(requests));

    alert("Request submitted! Servora AI analyzed the issue.");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
