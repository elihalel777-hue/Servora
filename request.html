<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Maintenance Request - Servora</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
position:fixed;
background:#020617;
padding:25px;
}

.sidebar h2{
color:#60a5fa;
}

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
margin:18px 0;
}

.main{
margin-left:270px;
padding:30px;
}

select,
textarea,
input{
width:100%;
max-width:650px;
padding:14px;
margin:12px 0;
border:none;
border-radius:8px;
font-size:16px;
}

textarea{
height:160px;
}

button{
padding:14px 24px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.label{
color:#60a5fa;
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>SERVORA</h2>

<a href="dashboard.html">Dashboard</a>
<a href="properties.html">Properties</a>
<a href="buildings.html">Buildings</a>
<a href="units.html">Units</a>
<a href="request.html">Maintenance Request</a>
<a href="technician.html">Technician Portal</a>

</div>

<div class="main">

<h1>Submit Maintenance Request</h1>

<p>Select the property, building and unit.</p>

<select id="propertySelect">
<option>Select Property</option>
</select>

<select id="buildingSelect">
<option>Select Building</option>
</select>

<select id="unitSelect">
<option>Select Unit</option>
</select>

<textarea
id="description"
placeholder="Describe the maintenance issue..."></textarea>

<input
type="file"
id="photo">

<button onclick="submitRequest()">

Submit Request

</button>

<div id="result"></div>

<script>

const API_URL="http://localhost:3000";

let buildings=[];
let units=[];

async function loadProperties(){

const response=await fetch(API_URL+"/properties");

const properties=await response.json();

const dropdown=document.getElementById("propertySelect");

dropdown.innerHTML="<option>Select Property</option>";

properties.forEach(property=>{

dropdown.innerHTML+=`

<option value="${property.name}">

${property.name}

</option>

`;

});

}
async function loadBuildings(){

const response=await fetch(API_URL+"/buildings");

buildings=await response.json();

updateBuildings();

}

async function loadUnits(){

const response=await fetch(API_URL+"/units");

units=await response.json();

}

function updateBuildings(){

const property=document.getElementById("propertySelect").value;

const dropdown=document.getElementById("buildingSelect");

dropdown.innerHTML="<option>Select Building</option>";

buildings
.filter(b=>b.property===property)
.forEach(building=>{

dropdown.innerHTML+=`

<option value="${building.name}">

${building.name}

</option>

`;

});

updateUnits();

}

function updateUnits(){

const property=document.getElementById("propertySelect").value;

const building=document.getElementById("buildingSelect").value;

const dropdown=document.getElementById("unitSelect");

dropdown.innerHTML="<option>Select Unit</option>";

units
.filter(u=>u.property===property && u.building===building)
.forEach(unit=>{

dropdown.innerHTML+=`

<option value="${unit.unit}">

${unit.unit}

</option>

`;

});

}

document.getElementById("propertySelect").addEventListener("change",updateBuildings);

document.getElementById("buildingSelect").addEventListener("change",updateUnits);

function analyzeIssue(text){

text=text.toLowerCase();

if(text.includes("water")||text.includes("leak")||text.includes("pipe")){

return{
category:"Plumbing",
priority:"High",
technician:"Plumber"
};

}

if(text.includes("ac")||text.includes("air")||text.includes("hvac")){

return{
category:"HVAC",
priority:"High",
technician:"HVAC Technician"
};

}

if(text.includes("electric")||text.includes("outlet")||text.includes("breaker")){

return{
category:"Electrical",
priority:"Emergency",
technician:"Electrician"
};

}

return{
category:"General Maintenance",
priority:"Medium",
technician:"Maintenance Technician"
};

}

async function submitRequest(){

const ai=analyzeIssue(document.getElementById("description").value);

await fetch(API_URL+"/requests",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

property:document.getElementById("propertySelect").value,

building:document.getElementById("buildingSelect").value,

unit:document.getElementById("unitSelect").value,

description:document.getElementById("description").value,

category:ai.category,

priority:ai.priority,

technician:ai.technician

})

});

alert("Maintenance request submitted!");

}

loadProperties();
loadBuildings();
loadUnits();

</script>

</div>

</body>
</html>
