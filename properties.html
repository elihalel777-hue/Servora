<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Properties - Servora</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: #020617;
    padding: 25px;
}

.sidebar h2 {
    color: #60a5fa;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 18px 0;
}

.main {
    margin-left: 270px;
    padding: 30px;
}

input {
    width: 100%;
    max-width: 600px;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

button {
    padding: 14px 24px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
    max-width: 700px;
}

.label {
    color: #60a5fa;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SERVORA</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="properties.html">Properties</a>
    <a href="buildings.html">Buildings</a>
    <a href="units.html">Units</a>
    <a href="request.html">Maintenance Request</a>
    <a href="technician.html">Technician Portal</a>
</div>

<div class="main">
    <h1>Properties</h1>
    <p>Add and manage properties using the Servora backend.</p>

    <input id="propertyName" type="text" placeholder="Property Name">
    <input id="propertyAddress" type="text" placeholder="Property Address">
    <input id="propertyUnits" type="number" placeholder="Number of Units">

    <button onclick="saveProperty()">Save Property</button>

    <h2>Saved Properties</h2>
    <div id="propertyList"></div>
</div>

<script>
const API_URL = "http://localhost:3000";

async function loadProperties() {
    const response = await fetch(API_URL + "/properties");
    const properties = await response.json();

    const list = document.getElementById("propertyList");
    list.innerHTML = "";

    if (properties.length === 0) {
        list.innerHTML = "<p>No properties saved yet.</p>";
        return;
    }

    properties.forEach(property => {
        list.innerHTML += `
            <div class="card">
                <h3>${property.name}</h3>
                <p><span class="label">Address:</span> ${property.address}</p>
                <p><span class="label">Units:</span> ${property.units}</p>
            </div>
        `;
    });
}

async function saveProperty() {
    const name = document.getElementById("propertyName").value;
    const address = document.getElementById("propertyAddress").value;
    const units = document.getElementById("propertyUnits").value;

    if (name === "" || address === "" || units === "") {
        alert("Complete all fields.");
        return;
    }

    await fetch(API_URL + "/properties", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            address: address,
            units: units
        })
    });

    document.getElementById("propertyName").value = "";
    document.getElementById("propertyAddress").value = "";
    document.getElementById("propertyUnits").value = "";

    loadProperties();
}

loadProperties();
</script>

</body>
</html>
