<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servora Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{

    width:420px;
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,.5);

}

h1{

    text-align:center;
    margin-bottom:10px;
    color:white;

}

p{

    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;

}

input{

    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    font-size:16px;

}

button{

    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

.links{

    margin-top:25px;
    text-align:center;

}

a{

    color:#60a5fa;
    text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<h1>SERVORA</h1>

<p>AI-Powered Maintenance Operations</p>

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<button onclick="window.location.href='dashboard.html'">

Login

</button>

<div class="links">

<p>

<a href="#">Forgot Password?</a>

<br><br>

<a href="#">Create Account</a>

</p>

</div>

</div>

</body>

</html>
