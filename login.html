<!DOCTYPE html>
<html>
<head>
    <title>Servora Login</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .login-box {
            background: #111827;
            padding: 40px;
            border-radius: 15px;
            width: 360px;
        }

        h1 {
            color: #60a5fa;
        }

        p {
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>SERVORA</h1>
    <p>Login to your maintenance dashboard</p>

    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Password">

    <button class="btn" onclick="window.location.href='dashboard.html'">
        Login
    </button>

    <p><a href="#">Forgot Password?</a></p>
    <p><a href="#">Create Account</a></p>
    <p><a href="index.html">Back to Home</a></p>
</div>

</body>
</html>
